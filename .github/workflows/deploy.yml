name: Build and Run Ansible Image

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Важно для пуша в GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GIT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ansible-run:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Используем только что собранный образ как окружение для всей задачи
    container:
      image: ghcr.io/leshevi/wireguard_wireproxy_timeweb:master
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.TOKEN_GIT }}
    env:
      ANSIBLE_ROLES_PATH: ./ansible/roles
      ANSIBLE_PRIVATE_KEY_FILE: /root/.ssh/id_rsa
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_DEPRECATION_WARNINGS: "False"
      ANSIBLE_INVENTORY: "./dynamic_inventory.json"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible Galaxy roles
        run: |
          # Определяем URL для каждой роли (или одной основной)
          # Если ролей много, в requirements.yml должно быть несколько заглушек типа GITLAB_URL_1, GITLAB_URL_2
          URL_DOCKER="https://${{ secrets.GITLAB_USER }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/ansible_playbooks7843206/docker.git"
          URL_WIRE="https://${{ secrets.GITLAB_USER }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/ansible_playbooks7843206/wireproxy_linux_windows.git"

          # Заменяем заглушки в файле на реальные URL с токенами
          # Предположим, в вашем requirements.yml строки выглядят как src: GITLAB_URL_DOCKER
          sed -i "s|ROLE_URL_DOCKER|$URL_DOCKER|g" ansible/requirements.yml
          sed -i "s|ROLE_URL_WIREPROXY|$URL_WIRE|g" ansible/requirements.yml

          echo "Requirements file updated."

          # Устанавливаем роли
          ansible-galaxy install -r ansible/requirements.yml -p ${{ env.ANSIBLE_ROLES_PATH }}

      - name: Setup SSH Key
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          echo "${{ secrets.SSH_KEY }}" > /root/.ssh/id_rsa
          chmod 600 /root/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> /root/.ssh/config

      - name: Generate Dynamic Inventory from Timeweb
        run: |
          # 1. Формируем JSON-инвентарь через API
          curl -s -X GET "${{ secrets.TW_API_URL }}" \
            -H "Authorization: Bearer ${{ secrets.TOKEN_TIMEWEB }}" | jq --arg target "${{ secrets.TARGET_COMMENT }}" '
          # Фильтруем серверы по комментарию
          [.servers[] | select(.comment == $target)] as $filtered |
          {
            "all": {
              "hosts": (
                $filtered | map({
                  key: .name,
                  value: {
                    ansible_host: (.networks[].ips[] | select(.type == "ipv4") | .ip),
                    ansible_user: "ansible",
                    tw_comment: .comment
                  }
                }) | from_entries
              )
            }
          }' > dynamic_inventory.json

          # 2. Проверка результата (вывод в лог GitHub Actions)
          echo "Generated Inventory:"
          cat dynamic_inventory.json

      - name: Check Connection (Ping)
        run: |
          ansible all -i ./dynamic_inventory.json -m ping

      - name: Run Ansible Version Check
        run: |
          export ANSIBLE_ROLES_PATH
          ansible-playbook -i dynamic_inventory.json ansible/playbook.yml

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        if: always() # Запускать всегда (и при успехе, и при ошибке)
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Deploy Status: ${{ job.status }}
            📦 Repository: ${{ github.repository }}
            🌿 Branch: ${{ github.ref_name }}
            👤 Author: ${{ github.actor }}
            
          Check details: https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}
